# This is a basic workflow to help you get started with Actions

name: publishToNPM

# Controls when the action will run. Triggers the workflow on pull request
# event
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM tag for the release (e.g., latest, beta, alpha, next)'
        required: false
        default: 'latest'
        type: string

permissions:
  id-token: write  # Required for OIDC
  contents: write  # Required to push the release git tag

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
            node-version: '20.19.4'
            registry-url: 'https://registry.npmjs.org'

      - name: Get Branch Name
        id: branch_name
        run: echo "::set-output name=BRANCH_NAME::$(git branch --show-current)"
        
      - name: Get Latest Tag 
        id: latest_tag
        run: |
          echo "Getting Git tag list.."
          git fetch --depth=1 origin +refs/tags/*:refs/tags/* | sort -V
          
          echo "Getting the latest Git tag."
          git tag -l | sort -V | tail -n 1  
          
          # Get the latest Git tag and set it as an output variable
          echo "::set-output name=LATEST_TAG::$(git tag -l | sort -V | tail -n 1)"           
      
      - name: Update npm
        run: npm install -g npm@11.5.1 # use npm@11.5.1 for OIDC
      
      # Run npm install
      - name: Run npm install
        run: npm install --legacy-peer-deps

      # Publish
      - name: Publish
        run: |
          BRANCH_NAME="${{ steps.branch_name.outputs.BRANCH_NAME }}"
          NPM_TAG=$(echo "${{ github.event.inputs.tag }}" | tr '[:upper:]' '[:lower:]')
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "publish prod with tag: $NPM_TAG"
            npm publish --tag $NPM_TAG
          elif [ "$NPM_TAG" = "latest" ]; then
            echo "Error: 'latest' tag can only be used when publishing from the main branch"
            echo "Current branch: $BRANCH_NAME"
            exit 1
          else
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            if [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: Stable versions (X.Y.Z) can only be published from the main branch"
              echo "Current version: $CURRENT_VERSION"
              echo "Current branch: $BRANCH_NAME"
              echo "Please use a pre-release version (e.g., X.Y.Z-beta.1, X.Y.Z-alpha.0) for non-main branches"
              exit 1
            fi
            echo "Publishing from $BRANCH_NAME branch with tag: $NPM_TAG"
            npm publish --tag $NPM_TAG
          fi

      - name: Tag the release
        if: success() && steps.branch_name.outputs.BRANCH_NAME == 'main'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TAG="v$CURRENT_VERSION"

          # A tag only exists for something that actually published, so consumers
          # can `git checkout $TAG` to get the exact source for a release.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $CURRENT_VERSION"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        if: success() && steps.branch_name.outputs.BRANCH_NAME == 'main'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Pick the boundary for "changes in this release".
          #
          # PREFERRED: the most recent PUBLISHED version tag (vX.Y.Z). This
          # pipeline creates a tag on every publish, so tags mark real releases
          # regardless of HOW the version was bumped — a manual package.json edit
          # in a feature PR can't bypass it. We exclude the current version in
          # case its tag already exists (e.g. a re-run). Filtering on 'v[0-9]*'
          # ignores non-version tags like objectSearchEmbedTag, and
          # --sort=-v:refname is a correct version sort.
          PREV_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname --merged HEAD \
                     | grep -vx "v$CURRENT_VERSION" | head -n1)

          if [ -n "$PREV_TAG" ]; then
            BOUNDARY="$PREV_TAG"
          else
            # FALLBACK (transition / first release before any version tag exists):
            # the previous "chore: release vX.Y.Z" commit. Anchored to the START
            # of the subject so commits that merely mention the phrase don't match.
            BOUNDARY=$(git log --pretty=format:'%H %s' | grep -m2 -E '^[0-9a-f]{40} chore: release' | tail -n1 | awk '{print $1}')
          fi

          # Last resort: never dump full history if we found no boundary at all.
          BOUNDARY="${BOUNDARY:-HEAD~1}"
          RANGE="$BOUNDARY..HEAD"
          echo "Building changelog for $CURRENT_VERSION (since $BOUNDARY)"

          ALL=$(git log --pretty=format:"%s" $RANGE | grep -viE '^(chore: )?bump|^chore: release' || true)

          # Classify by description, ignoring any SCAL-ID / conventional prefix.
          FIXES=""; FEATURES=""; OTHER=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            desc=$(echo "$line" | sed -E 's/^(SCAL-[0-9]+[: ]*)?((fix|feat|chore|refactor|docs)(\([^)]*\))?: *)?//I')
            if echo "$line $desc" | grep -qiE '(^|[^a-z])(fix|fixes|fixed|bug|patch)([^a-z]|$)'; then
              FIXES="${FIXES}- ${line}"$'\n'
            elif echo "$line $desc" | grep -qiE '(^|[^a-z])(feat|feature|add|added|support|introduce)([^a-z]|$)'; then
              FEATURES="${FEATURES}- ${line}"$'\n'
            else
              OTHER="${OTHER}- ${line}"$'\n'
            fi
          done <<< "$ALL"

          {
            echo "## Release $CURRENT_VERSION"
            echo ""
            if [ -z "$FEATURES$FIXES$OTHER" ]; then
              echo "_No notable changes since the previous release._"
            else
              [ -n "$FEATURES" ] && { echo "### ✨ Features";  echo "$FEATURES"; }
              [ -n "$FIXES" ]    && { echo "### 🐛 Bug Fixes"; echo "$FIXES"; }
              [ -n "$OTHER" ]    && { echo "### 🔧 Other";     echo "$OTHER"; }
            fi
          } > release_notes.md

          cat release_notes.md

      - name: Create Draft Release
        if: success() && steps.branch_name.outputs.BRANCH_NAME == 'main'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          gh release create "v$CURRENT_VERSION" -t "Release $CURRENT_VERSION" -F release_notes.md -d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

